version: "3.8"

services:
  paymybuddy-db:
    image: mysql:8
    container_name: paymybuddy-db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  paymybuddy-backend:
    build: .
    image: paymybuddy-backend:1.0
    container_name: paymybuddy-backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - paymybuddy-db

volumes:
  db_data:

